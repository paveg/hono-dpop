name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      statuses: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          # Node 24 ships with npm 11.x, required for Trusted Publishing (OIDC).
          # Node 22 ships with npm 10.x, and `npm install -g npm@latest` is
          # unreliable in CI due to a known self-upgrade bug.
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          publish: pnpm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Set ci-pass status on Version Packages PR
        # The Version Packages PR is created by GITHUB_TOKEN, which by design
        # does not retrigger workflows — so ci.yml never runs on it. The PR's
        # diff is purely mechanical (version bump + CHANGELOG) over a main
        # commit that already passed CI, so we mark ci-pass as success
        # directly via the statuses API rather than blocking on a CI run that
        # cannot start.
        if: steps.changesets.outputs.pullRequestNumber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.changesets.outputs.pullRequestNumber }}
        run: |
          sleep 5
          PR_SHA=$(gh pr view "$PR_NUMBER" --json headRefOid -q .headRefOid)
          gh api "repos/${{ github.repository }}/statuses/${PR_SHA}" \
            -f state=success \
            -f context=ci-pass \
            -f description="Version Packages PR — source already verified on main"
          # Retry if SHA changed due to API eventual consistency
          sleep 5
          NEW_SHA=$(gh pr view "$PR_NUMBER" --json headRefOid -q .headRefOid)
          if [ "$NEW_SHA" != "$PR_SHA" ]; then
            gh api "repos/${{ github.repository }}/statuses/${NEW_SHA}" \
              -f state=success \
              -f context=ci-pass \
              -f description="Version Packages PR — source already verified on main"
          fi
