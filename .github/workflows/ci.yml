name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm vitest run --coverage
      - uses: codecov/codecov-action@v6
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - run: pnpm build

  bun:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      # Bun reads pnpm-lock.yaml since v1.2 — no need for a separate lockfile.
      - run: bun install --frozen-lockfile
      - run: bun --bun run vitest run
      - run: bun --bun run typecheck

  deno:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - uses: denoland/setup-deno@v2
        with:
          deno-version: vx.x.x
      # Vitest does not run on Deno; we only verify the published bundle loads
      # and the public API constructs cleanly. The pnpm install + build step
      # produces dist/ and populates node_modules/ so Deno can resolve `hono`
      # via --node-modules-dir=auto.
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: deno run --allow-read --allow-env --node-modules-dir=auto .github/scripts/smoke-deno.ts

  type-compat:
    runs-on: ubuntu-latest
    needs: ci
    strategy:
      fail-fast: false
      matrix:
        ts: ["5.0.4", "5.4.5", "5.7.3", "5.9.3", "6.0.3"]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Type-check consumer against TS ${{ matrix.ts }}
        env:
          TS_VERSION: ${{ matrix.ts }}
        run: pnpm dlx --package="typescript@${TS_VERSION}" -c 'tsc -p tsconfig.compat.json'

  ci-pass:
    if: always()
    needs: [ci, bun, deno, type-compat]
    runs-on: ubuntu-latest
    steps:
      - run: exit 1
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
