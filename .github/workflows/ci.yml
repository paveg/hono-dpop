name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm vitest run --coverage
      - uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - run: pnpm build

  bun:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      # Bun reads pnpm-lock.yaml since v1.2 — no need for a separate lockfile.
      - run: bun install --frozen-lockfile
      - run: bun --bun run vitest run
      - run: bun --bun run typecheck

  deno:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: denoland/setup-deno@v2
        with:
          deno-version: vx.x.x
      # Vitest does not run on Deno; we only verify the published bundle loads
      # and the public API constructs cleanly. The pnpm install + build step
      # produces dist/ and populates node_modules/ so Deno can resolve `hono`
      # via --node-modules-dir=auto.
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: deno run --allow-read --allow-env --node-modules-dir=auto .github/scripts/smoke-deno.ts

  ci-pass:
    if: always()
    needs: [ci, bun, deno]
    runs-on: ubuntu-latest
    steps:
      - run: exit 1
        if: needs.ci.result != 'success' || needs.bun.result != 'success' || needs.deno.result != 'success'
